name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm check # Biome: lint + format verify
      - run: pnpm typecheck # turbo → tsc --noEmit
      - run: pnpm test # turbo → vitest
      - run: pnpm build # turbo → next build
